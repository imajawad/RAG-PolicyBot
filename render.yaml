# Render deployment configuration
# https://render.com/docs/yaml-defined-services

services:
  - type: web
    name: policy-rag
    runtime: python
    buildCommand: "pip install -r requirements.txt && python rag/ingest.py"
    startCommand: "gunicorn app:app --workers 2 --timeout 120"
    envVars:
      - key: GROQ_API_KEY
        sync: false          # Set manually in Render dashboard
      - key: FLASK_ENV
        value: production
      - key: CHROMA_PATH
        value: chroma_db
      - key: POLICIES_PATH
        value: policies
